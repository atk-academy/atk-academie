<title>ATK</title>
<style>
  :root{
    --bg-1:#050303; --bg-2:#170606;
    --blob-a:#4a0d0d; --blob-b:#6b0f0f; --blob-c:#250505;
    --surface:rgba(255,255,255,.05); --surface-strong:rgba(255,255,255,.09);
    --border:rgba(255,90,70,.14); --border-strong:rgba(255,90,70,.24);
    --text-hi:#f5eceb; --text-lo:#a58787; --text-faint:#6b4f4f;
    --accent:#ff4136; --accent-2:#ff7a6e;
    --shadow:0 20px 60px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; height:100%; }
  body{
    color:var(--text-hi); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI Variable","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg, var(--bg-1), var(--bg-2)); min-height:100vh; overflow-x:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .liquid-bg{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; filter:blur(45px); }
  .liquid-bg span{ position:absolute; width:60vmax; height:60vmax; border-radius:50%; opacity:.6; }
  .liquid-bg span:nth-child(1){ top:-15%; left:-15%; background:var(--blob-a); animation:blob1 14s ease-in-out infinite; }
  .liquid-bg span:nth-child(2){ top:10%; right:-20%; background:var(--blob-b); animation:blob2 19s ease-in-out infinite; }
  .liquid-bg span:nth-child(3){ bottom:-20%; left:20%; background:var(--blob-c); animation:blob3 23s ease-in-out infinite; }
  @keyframes blob1{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(20%,15%) scale(1.2);} }
  @keyframes blob2{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-20%,10%) scale(1.15);} }
  @keyframes blob3{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(15%,-20%) scale(1.1);} }

  .hub{ position:relative; z-index:1; text-align:center; padding:40px 20px; }

  .logo-wrap{ opacity:0; transform:scale(.6) translateY(24px); animation:logoIn 1s cubic-bezier(.2,.8,.2,1) .1s forwards; }
  .logo-wrap img{ width:140px; height:140px; border-radius:32px; box-shadow:0 20px 60px -10px rgba(0,0,0,.7), 0 0 90px -20px var(--accent); }
  @keyframes logoIn{ to{ opacity:1; transform:scale(1) translateY(0); } }

  h1{
    font-size:44px; font-weight:900; letter-spacing:.16em; margin:22px 0 0;
    opacity:0; animation:fadeUp .8s ease .5s forwards;
  }
  .tagline{
    font-size:14px; color:var(--text-lo); font-weight:700; letter-spacing:.04em; margin:8px 0 44px;
    opacity:0; animation:fadeUp .8s ease .7s forwards;
  }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

  .nav-dots{ display:flex; gap:28px; justify-content:center; flex-wrap:wrap; opacity:0; animation:fadeUp .8s ease .95s forwards; }
  .nav-dot{
    display:flex; flex-direction:column; align-items:center; gap:14px; text-decoration:none; color:var(--text-hi);
    width:150px;
  }
  .nav-dot .circle{
    width:104px; height:104px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:var(--surface); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border); box-shadow:var(--shadow);
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .nav-dot .circle svg{ width:40px; height:40px; color:var(--accent-2); }
  .nav-dot:hover .circle{ transform:translateY(-6px) scale(1.05); border-color:var(--accent); box-shadow:var(--shadow), 0 0 40px -10px var(--accent); }
  .nav-dot .label{ font-size:14px; font-weight:800; }
  .nav-dot .sub{ font-size:11px; color:var(--text-faint); font-weight:600; }
</style>
