<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg-1:#050303; --bg-2:#170606;
    --blob-a:#4a0d0d; --blob-b:#6b0f0f; --blob-c:#250505;
    --accent:#ff4136; --text-hi:#f5eceb; --text-lo:#a58787;
    --bronze:#7a4a26; --bronze-2:#c98a52;
    --silver:#8a94a0; --silver-2:#d7dee4;
    --gold:#b8860b; --gold-2:#f0c860;
    --diamond:#1f6f94; --diamond-2:#5cc3ea;
    --champion:#5b21a8; --champion-2:#a565f0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{
    background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text-hi);
    width:1200px; height:680px; position:relative;
  }
  .liquid-bg{ position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; filter:blur(45px); }
  .liquid-bg span{ position:absolute; width:60vmax; height:60vmax; border-radius:50%; opacity:.7; }
  .liquid-bg span:nth-child(1){ top:-15%; left:-15%; background:var(--blob-a); animation:blob1 11s ease-in-out infinite; }
  .liquid-bg span:nth-child(2){ top:10%; right:-20%; background:var(--blob-b); animation:blob2 15s ease-in-out infinite; }
  .liquid-bg span:nth-child(3){ bottom:-20%; left:20%; background:var(--blob-c); animation:blob3 18s ease-in-out infinite; }
  .liquid-bg span:nth-child(4){ bottom:-10%; right:-10%; background:var(--blob-b); animation:blob4 13s ease-in-out infinite; }
  @keyframes blob1{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 30%{transform:translate(38%,26%) rotate(40deg) scale(1.4);} 60%{transform:translate(12%,55%) rotate(-30deg) scale(0.8);} 80%{transform:translate(48%,14%) rotate(60deg) scale(1.15);} }
  @keyframes blob2{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 25%{transform:translate(-44%,32%) rotate(-45deg) scale(0.75);} 55%{transform:translate(-18%,-38%) rotate(35deg) scale(1.35);} 85%{transform:translate(-50%,6%) rotate(-60deg) scale(1);} }
  @keyframes blob3{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 35%{transform:translate(32%,-44%) rotate(50deg) scale(1.3);} 65%{transform:translate(-25%,-19%) rotate(-40deg) scale(0.85);} 90%{transform:translate(19%,-56%) rotate(30deg) scale(1.15);} }
  @keyframes blob4{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 28%{transform:translate(-31%,-31%) rotate(-35deg) scale(0.8);} 58%{transform:translate(-56%,13%) rotate(45deg) scale(1.3);} 82%{transform:translate(-13%,-48%) rotate(-20deg) scale(1);} }

  .stage{ position:relative; z-index:1; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .title{ font-size:17px; font-weight:800; letter-spacing:.24em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
  .subtitle{ font-size:32px; font-weight:800; margin-bottom:56px; }

  .grades{ display:flex; gap:56px; }
  .grade{ display:flex; flex-direction:column; align-items:center; opacity:0; }
  .badge{ position:relative; overflow:hidden; width:112px; height:112px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:16px; box-shadow:0 12px 30px -8px rgba(0,0,0,.55), inset 0 1px 1px rgba(255,255,255,.4); }
  .badge svg{ width:52px; height:52px; position:relative; z-index:1; }
  .badge::after{ content:""; position:absolute; inset:0; border-radius:50%; background:linear-gradient(135deg, rgba(255,255,255,.65) 0%, rgba(255,255,255,.2) 26%, transparent 46%, transparent 100%); pointer-events:none; z-index:2; }
  .badge::before{ content:""; position:absolute; top:-60%; left:-160%; width:70%; height:220%; background:linear-gradient(78deg, transparent, rgba(255,255,255,.6), transparent); transform:rotate(18deg); animation:shine 4.5s ease-in-out infinite; z-index:2; }
  @keyframes shine{ 0%{ left:-160%; } 45%{ left:160%; } 100%{ left:160%; } }
  .g-label{ font-size:17px; font-weight:800; letter-spacing:.04em; }
  .g-tag{ font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-lo); margin-top:5px; }

  .g1 .badge{ background:radial-gradient(circle at 35% 30%, var(--bronze-2), var(--bronze)); }
  .g2 .badge{ background:radial-gradient(circle at 35% 30%, var(--silver-2), var(--silver)); }
  .g3 .badge{ background:radial-gradient(circle at 35% 30%, var(--gold-2), var(--gold)); }
  .g4 .badge{ background:radial-gradient(circle at 35% 30%, var(--diamond-2), var(--diamond)); }
  .g5 .badge{ background:radial-gradient(circle at 35% 30%, var(--champion-2), var(--champion)); }

  .caption{ position:absolute; left:0; right:0; bottom:64px; text-align:center; font-size:26px; font-weight:800; letter-spacing:.01em; opacity:0; padding:0 40px; }
  .caption .hi{ color:var(--accent); }
  .caption-sub{ margin-top:10px; font-size:15px; font-weight:700; color:var(--text-lo); letter-spacing:.04em; text-transform:uppercase; }

  @keyframes reveal{
    0%,4%   { opacity:0; transform:scale(.4) translateY(24px); }
    8%      { opacity:1; transform:scale(1) translateY(0); }
    86%     { opacity:1; transform:scale(1) translateY(0); }
    92%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes revealCaption1{
    0%,14%  { opacity:0; transform:translateY(10px); }
    19%     { opacity:1; transform:translateY(0); }
    34%     { opacity:1; transform:translateY(0); }
    39%,100%{ opacity:0; transform:translateY(10px); }
  }
  @keyframes revealCaption2{
    0%,39%  { opacity:0; transform:translateY(10px); }
    44%     { opacity:1; transform:translateY(0); }
    86%     { opacity:1; transform:translateY(0); }
    92%,100%{ opacity:0; transform:translateY(10px); }
  }
  @keyframes revealTitle{
    0%,2%   { opacity:0; }
    6%      { opacity:1; }
    86%     { opacity:1; }
    92%,100%{ opacity:0; }
  }

  .g1{ animation:reveal 16s ease-in-out infinite; animation-delay:0s; }
  .g2{ animation:reveal 16s ease-in-out infinite; animation-delay:0s; }
  .g3{ animation:reveal 16s ease-in-out infinite; animation-delay:0s; }
  .g4{ animation:reveal 16s ease-in-out infinite; animation-delay:0s; }
  .g5{ animation:reveal 16s ease-in-out infinite; animation-delay:0s; }

  .g1{ animation-name: reveal1; }
  .g2{ animation-name: reveal2; }
  .g3{ animation-name: reveal3; }
  .g4{ animation-name: reveal4; }
  .g5{ animation-name: reveal5; }

  @keyframes reveal1{
    0%,3% { opacity:0; transform:scale(.4) translateY(24px); }
    7%    { opacity:1; transform:scale(1) translateY(0); }
    86%   { opacity:1; transform:scale(1) translateY(0); }
    92%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal2{
    0%,16% { opacity:0; transform:scale(.4) translateY(24px); }
    20%    { opacity:1; transform:scale(1) translateY(0); }
    86%    { opacity:1; transform:scale(1) translateY(0); }
    92%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal3{
    0%,36% { opacity:0; transform:scale(.4) translateY(24px); }
    40%    { opacity:1; transform:scale(1) translateY(0); }
    86%    { opacity:1; transform:scale(1) translateY(0); }
    92%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal4{
    0%,51% { opacity:0; transform:scale(.4) translateY(24px); }
    55%    { opacity:1; transform:scale(1) translateY(0); }
    86%    { opacity:1; transform:scale(1) translateY(0); }
    92%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal5{
    0%,66% { opacity:0; transform:scale(.4) translateY(24px); }
    70%    { opacity:1; transform:scale(1) translateY(0); }
    86%    { opacity:1; transform:scale(1) translateY(0); }
    92%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }

  .title, .subtitle{ animation:revealTitle 16s ease-in-out infinite; opacity:0; }
  .caption-1{ animation:revealCaption1 16s ease-in-out infinite; }
  .caption-2{ animation:revealCaption2 16s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="liquid-bg" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  <div class="stage">
    <div class="title">ATK Academy</div>
    <div class="subtitle">Système de grades</div>

    <div class="grades">
      <div class="grade g1">
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#2e1a08" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L14.5 9 L22 9.5 L16 14.5 L18 22 L12 17.5 L6 22 L8 14.5 L2 9.5 L9.5 9 Z"/></svg>
        </div>
        <div class="g-label">Bronze</div>
        <div class="g-tag">Départ</div>
      </div>
      <div class="grade g2">
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3a3f47" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L14.5 9 L22 9.5 L16 14.5 L18 22 L12 17.5 L6 22 L8 14.5 L2 9.5 L9.5 9 Z"/></svg>
        </div>
        <div class="g-label">Argent</div>
        <div class="g-tag">Garanti à 1 mois</div>
      </div>
      <div class="grade g3">
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4d3800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L14.5 9 L22 9.5 L16 14.5 L18 22 L12 17.5 L6 22 L8 14.5 L2 9.5 L9.5 9 Z"/></svg>
        </div>
        <div class="g-label">Or</div>
        <div class="g-tag">Selon ta progression</div>
      </div>
      <div class="grade g4">
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a2c3a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L14.5 9 L22 9.5 L16 14.5 L18 22 L12 17.5 L6 22 L8 14.5 L2 9.5 L9.5 9 Z"/></svg>
        </div>
        <div class="g-label">Diamant</div>
        <div class="g-tag">Selon ta progression</div>
      </div>
      <div class="grade g5">
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#2a1240" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L14.5 9 L22 9.5 L16 14.5 L18 22 L12 17.5 L6 22 L8 14.5 L2 9.5 L9.5 9 Z"/></svg>
        </div>
        <div class="g-label">Champion</div>
        <div class="g-tag">Selon ta progression</div>
      </div>
    </div>

    <div class="caption caption-1">Au bout d'<span class="hi">1 mois</span>, tu seras <span class="hi">minimum Argent</span></div>
    <div class="caption caption-2">La suite dépend entièrement de <span class="hi">ta motivation</span> et de <span class="hi">ta progression</span><div class="caption-sub">Or · Diamant · Champion</div></div>
  </div>
</body>
</html>
