<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg-1:#050303; --bg-2:#170606;
    --blob-a:#4a0d0d; --blob-b:#6b0f0f; --blob-c:#250505;
    --accent:#ff4136; --text-hi:#f5eceb; --text-lo:#a58787;
    --bronze:#7a4a26; --bronze-2:#c98a52;
    --silver:#8a94a0; --silver-2:#d7dee4;
    --gold:#b8860b; --gold-2:#f0c860;
    --diamond:#1f6f94; --diamond-2:#5cc3ea;
    --champion:#5b21a8; --champion-2:#a565f0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{
    background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text-hi);
    width:1200px; height:680px; position:relative;
  }
  .liquid-bg{ position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; filter:blur(45px); }
  .liquid-bg span{ position:absolute; width:60vmax; height:60vmax; border-radius:50%; opacity:.7; }
  .liquid-bg span:nth-child(1){ top:-15%; left:-15%; background:var(--blob-a); animation:blob1 11s ease-in-out infinite; }
  .liquid-bg span:nth-child(2){ top:10%; right:-20%; background:var(--blob-b); animation:blob2 15s ease-in-out infinite; }
  .liquid-bg span:nth-child(3){ bottom:-20%; left:20%; background:var(--blob-c); animation:blob3 18s ease-in-out infinite; }
  .liquid-bg span:nth-child(4){ bottom:-10%; right:-10%; background:var(--blob-b); animation:blob4 13s ease-in-out infinite; }
  @keyframes blob1{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 30%{transform:translate(38%,26%) rotate(40deg) scale(1.4);} 60%{transform:translate(12%,55%) rotate(-30deg) scale(0.8);} 80%{transform:translate(48%,14%) rotate(60deg) scale(1.15);} }
  @keyframes blob2{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 25%{transform:translate(-44%,32%) rotate(-45deg) scale(0.75);} 55%{transform:translate(-18%,-38%) rotate(35deg) scale(1.35);} 85%{transform:translate(-50%,6%) rotate(-60deg) scale(1);} }
  @keyframes blob3{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 35%{transform:translate(32%,-44%) rotate(50deg) scale(1.3);} 65%{transform:translate(-25%,-19%) rotate(-40deg) scale(0.85);} 90%{transform:translate(19%,-56%) rotate(30deg) scale(1.15);} }
  @keyframes blob4{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 28%{transform:translate(-31%,-31%) rotate(-35deg) scale(0.8);} 58%{transform:translate(-56%,13%) rotate(45deg) scale(1.3);} 82%{transform:translate(-13%,-48%) rotate(-20deg) scale(1);} }

  .stage{ position:relative; z-index:1; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .title{ font-size:17px; font-weight:800; letter-spacing:.24em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
  .subtitle{ font-size:32px; font-weight:800; margin-bottom:56px; }

  .grades{ display:flex; gap:36px; }
  .grade{ display:flex; flex-direction:column; align-items:center; opacity:0; padding:26px 22px 22px; border-radius:30px; background:rgba(255,255,255,.07); backdrop-filter:blur(20px) saturate(160%); -webkit-backdrop-filter:blur(20px) saturate(160%); border:1px solid rgba(255,255,255,.16); box-shadow:0 10px 30px -10px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.1); }
  .badge-mark{ position:relative; width:150px; height:160px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; animation:float 3.6s ease-in-out infinite; }
  .badge-mark img{ position:relative; z-index:1; width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 10px 18px rgba(0,0,0,.55)); }
  .badge-glow{ position:absolute; inset:14%; border-radius:50%; z-index:0; filter:blur(22px); opacity:.8; }
  .badge-shine{
    content:""; position:absolute; inset:0; z-index:2; pointer-events:none;
    -webkit-mask-image:var(--mark); mask-image:var(--mark);
    -webkit-mask-size:contain; mask-size:contain;
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
    -webkit-mask-position:center; mask-position:center;
    background:linear-gradient(115deg, transparent 35%, rgba(255,255,255,.95) 50%, transparent 65%);
    background-size:320% 320%; background-position:-140% -140%;
    mix-blend-mode:overlay; animation:shineMove 4.5s ease-in-out infinite;
  }
  @keyframes shineMove{ 0%{ background-position:-140% -140%; } 55%{ background-position:140% 140%; } 100%{ background-position:140% 140%; } }
  @keyframes float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-9px); } }
  .g-label{ font-size:17px; font-weight:800; letter-spacing:.04em; }
  .g-tag{ font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-lo); margin-top:5px; }

  .g1 .badge-glow{ background:#000; opacity:.7; }
  .g2 .badge-glow{ background:#2b2b2f; opacity:.75; }
  .g3 .badge-glow{ background:var(--gold-2); }
  .g4 .badge-glow{ background:var(--diamond-2); }
  .g5 .badge-glow{ background:var(--champion-2); }

  .caption{ position:absolute; left:0; right:0; bottom:64px; text-align:center; font-size:26px; font-weight:800; letter-spacing:.01em; opacity:0; padding:0 40px; }
  .caption .hi{ color:var(--accent); }
  .caption-sub{ margin-top:10px; font-size:15px; font-weight:700; color:var(--text-lo); letter-spacing:.04em; text-transform:uppercase; }

  @keyframes revealCaption1{
    0%,15%  { opacity:0; transform:translateY(10px); }
    20%     { opacity:1; transform:translateY(0); }
    39%     { opacity:1; transform:translateY(0); }
    43%,100%{ opacity:0; transform:translateY(10px); }
  }
  @keyframes revealCaption2{
    0%,43%  { opacity:0; transform:translateY(10px); }
    47%     { opacity:1; transform:translateY(0); }
    89%     { opacity:1; transform:translateY(0); }
    93%,100%{ opacity:0; transform:translateY(10px); }
  }
  @keyframes revealTitle{
    0%,2%   { opacity:0; }
    6%      { opacity:1; }
    90%     { opacity:1; }
    94%,100%{ opacity:0; }
  }

  .g1{ animation:reveal1 20s ease-in-out infinite; }
  .g2{ animation:reveal2 20s ease-in-out infinite; }
  .g3{ animation:reveal3 20s ease-in-out infinite; }
  .g4{ animation:reveal4 20s ease-in-out infinite; }
  .g5{ animation:reveal5 20s ease-in-out infinite; }

  @keyframes reveal1{
    0%,4% { opacity:0; transform:scale(.4) translateY(24px); }
    8%    { opacity:1; transform:scale(1.08) translateY(0); }
    11%   { opacity:1; transform:scale(1) translateY(0); }
    90%   { opacity:1; transform:scale(1) translateY(0); }
    94%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal2{
    0%,13% { opacity:0; transform:scale(.4) translateY(24px); }
    17%    { opacity:1; transform:scale(1.08) translateY(0); }
    20%    { opacity:1; transform:scale(1) translateY(0); }
    90%    { opacity:1; transform:scale(1) translateY(0); }
    94%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal3{
    0%,41% { opacity:0; transform:scale(.4) translateY(24px); }
    45%    { opacity:1; transform:scale(1.08) translateY(0); }
    48%    { opacity:1; transform:scale(1) translateY(0); }
    90%    { opacity:1; transform:scale(1) translateY(0); }
    94%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal4{
    0%,55% { opacity:0; transform:scale(.4) translateY(24px); }
    59%    { opacity:1; transform:scale(1.08) translateY(0); }
    62%    { opacity:1; transform:scale(1) translateY(0); }
    90%    { opacity:1; transform:scale(1) translateY(0); }
    94%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }
  @keyframes reveal5{
    0%,67% { opacity:0; transform:scale(.4) translateY(24px); }
    71%    { opacity:1; transform:scale(1.08) translateY(0); }
    74%    { opacity:1; transform:scale(1) translateY(0); }
    90%    { opacity:1; transform:scale(1) translateY(0); }
    94%,100%{ opacity:0; transform:scale(.4) translateY(24px); }
  }

  .title, .subtitle{ animation:revealTitle 20s ease-in-out infinite; opacity:0; }
  .caption-1{ animation:revealCaption1 20s ease-in-out infinite; }
  .caption-2{ animation:revealCaption2 20s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="liquid-bg" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  <div class="stage">
    <div class="title">ATK Academy</div>
    <div class="subtitle">Système de grades</div>

    <div class="grades">
      <div class="grade g1">
        <div class="badge-mark" style="--mark:url('assets/grade-bronze.png')"><div class="badge-glow"></div>
          <img src="assets/grade-bronze.png" alt="Bronze"><div class="badge-shine"></div>
        </div>
        <div class="g-label">Bronze</div>
        <div class="g-tag">Départ</div>
      </div>
      <div class="grade g2">
        <div class="badge-mark" style="--mark:url('assets/grade-silver.png')"><div class="badge-glow"></div>
          <img src="assets/grade-silver.png" alt="Argent"><div class="badge-shine"></div>
        </div>
        <div class="g-label">Argent</div>
        <div class="g-tag">Garanti à 1 mois</div>
      </div>
      <div class="grade g3">
        <div class="badge-mark" style="--mark:url('assets/grade-gold.png')"><div class="badge-glow"></div>
          <img src="assets/grade-gold.png" alt="Or"><div class="badge-shine"></div>
        </div>
        <div class="g-label">Or</div>
        <div class="g-tag">Selon ta progression</div>
      </div>
      <div class="grade g4">
        <div class="badge-mark" style="--mark:url('assets/grade-diamond.png')"><div class="badge-glow"></div>
          <img src="assets/grade-diamond.png" alt="Diamant"><div class="badge-shine"></div>
        </div>
        <div class="g-label">Diamant</div>
        <div class="g-tag">Selon ta progression</div>
      </div>
      <div class="grade g5">
        <div class="badge-mark" style="--mark:url('assets/grade-champion.png')"><div class="badge-glow"></div>
          <img src="assets/grade-champion.png" alt="Champion"><div class="badge-shine"></div>
        </div>
        <div class="g-label">Champion</div>
        <div class="g-tag">Selon ta progression</div>
      </div>
    </div>

    <div class="caption caption-1">Au bout d'<span class="hi">1 mois</span>, tu seras <span class="hi">minimum Argent</span></div>
    <div class="caption caption-2">La suite dépend entièrement de <span class="hi">ta motivation</span> et de <span class="hi">ta progression</span><div class="caption-sub">Or · Diamant · Champion</div></div>
  </div>
</body>
</html>
